<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>DUO Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0F0F14;
      --card-bg:   #1A1A24;
      --card-act:  #22223A;
      --en-color:  #E8E8F0;
      --ja-color:  #8888A8;
      --no-color:  #44445A;
      --accent:    #6C63FF;
      --accent2:   #A78BFA;
      --player-bg: #13131E;
      --border:    rgba(255,255,255,0.06);
      --radius:    16px;
      --hdr-h:     56px;
      --ftr-h:     148px;
      --transition:0.25s cubic-bezier(.4,0,.2,1);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--en-color);
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* ── ヘッダー ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--hdr-h);
      background: rgba(15,15,20,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: calc(var(--hdr-h) - 3px);
    }

    .app-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--en-color);
    }

    .app-title .accent { color: var(--accent2); }

    .progress-label {
      font-size: 12px;
      color: var(--no-color);
      font-variant-numeric: tabular-nums;
    }

    .progress-bar-wrap {
      height: 3px;
      background: rgba(255,255,255,0.06);
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width 0.4s ease;
    }

    /* ── カードリスト ── */
    .card-list {
      padding: calc(var(--hdr-h) + 16px) 16px calc(var(--ftr-h) + 16px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 540px;
      margin: 0 auto;
    }

    /* ── カード ── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px 18px 14px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition:
        transform var(--transition),
        box-shadow var(--transition),
        background var(--transition);
      -webkit-user-select: none;
      user-select: none;
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: center;
      transition: transform var(--transition);
      border-radius: 0 2px 2px 0;
    }

    .card.active {
      background: var(--card-act);
      border-color: rgba(108,99,255,0.25);
      box-shadow: 0 0 0 1px rgba(108,99,255,0.15), 0 8px 32px rgba(0,0,0,0.4);
    }

    .card.active::before { transform: scaleY(1); }

    .card:active { transform: scale(0.985); }

    .card-no {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--no-color);
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }

    .card.active .card-no { color: var(--accent2); }

    .card-en {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.65;
      color: var(--en-color);
      margin-bottom: 8px;
      font-family: 'Inter', sans-serif;
    }

    .card.active .card-en { color: #fff; }

    .card-ja {
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--ja-color);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      max-height: 200px;
      transition: opacity var(--transition), max-height var(--transition);
      overflow: hidden;
    }

    .card-ja.hidden-ja {
      opacity: 0;
      max-height: 0;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 1px rgba(108,99,255,0.15), 0 8px 32px rgba(0,0,0,0.4); }
      50%       { box-shadow: 0 0 0 2px rgba(108,99,255,0.40), 0 8px 40px rgba(108,99,255,0.15); }
    }

    .card.playing { animation: pulse-border 1.8s ease-in-out infinite; }

    /* ── プレイヤー ── */
    .player {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--ftr-h);
      background: rgba(19,19,30,0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 20px env(safe-area-inset-bottom);
      z-index: 100;
    }

    .player-inner {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .player-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .player-no {
      font-size: 11px;
      color: var(--no-color);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
      min-width: 52px;
    }

    .speed-buttons {
      display: flex;
      gap: 4px;
    }

    .speed-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--ja-color);
      font-size: 10px;
      font-weight: 600;
      padding: 4px 7px;
      border-radius: 8px;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      font-family: 'Inter', sans-serif;
    }

    .speed-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border-radius: 50%;
      transition: background var(--transition), transform var(--transition);
      color: var(--en-color);
    }

    .ctrl-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .ctrl-btn:active { transform: scale(0.88); }

    .play-btn {
      background: var(--accent);
      width: 52px;
      height: 52px;
      box-shadow: 0 4px 20px rgba(108,99,255,0.45);
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    }

    .play-btn:active {
      transform: scale(0.92);
      box-shadow: 0 2px 10px rgba(108,99,255,0.3);
    }

    .play-btn svg { width: 26px; height: 26px; }

    .player-options {
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--ja-color);
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .toggle {
      width: 36px;
      height: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      position: relative;
      transition: background var(--transition);
      flex-shrink: 0;
    }

    .toggle.active { background: var(--accent); }

    .toggle-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #fff;
      transition: transform var(--transition);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .toggle.active .toggle-thumb { transform: translateX(16px); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <span class="app-title">DUO <span class="accent">Player</span></span>
      <span class="progress-label" id="progressLabel">1 / 560</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </header>

  <main class="card-list" id="cardList"></main>

  <footer class="player">
    <div class="player-inner">
      <div class="player-info">
        <span class="player-no" id="playerNo">No.001</span>
        <div class="speed-buttons" id="speedButtons">
          <button class="speed-btn" data-speed="0.5">0.5x</button>
          <button class="speed-btn" data-speed="0.75">0.75x</button>
          <button class="speed-btn active" data-speed="1">1.0x</button>
          <button class="speed-btn" data-speed="1.25">1.25x</button>
          <button class="speed-btn" data-speed="1.5">1.5x</button>
          <button class="speed-btn" data-speed="2">2.0x</button>
        </div>
      </div>
      <div class="player-controls">
        <button class="ctrl-btn" id="btnPrev" aria-label="前へ">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play-btn" id="btnPlay" aria-label="再生">
          <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn" id="btnNext" aria-label="次へ">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 4V8zm7-6h2v12h-2z"/></svg>
        </button>
      </div>
      <div class="player-options">
        <label class="toggle-label">
          <span>連続再生</span>
          <div class="toggle" id="toggleContinuous"><div class="toggle-thumb"></div></div>
        </label>
        <label class="toggle-label">
          <span>和訳表示</span>
          <div class="toggle active" id="toggleJa"><div class="toggle-thumb"></div></div>
        </label>
      </div>
    </div>
  </footer>

  <audio id="audioPlayer" preload="auto"></audio>


<script src="DUO.js"></script>

  <script>
    // ═══════════════════════════════════════════════
    //  APP
    // ═══════════════════════════════════════════════
    (() => {
      const TOTAL       = SENTENCES.length;
      const PER_FILE    = 100;
      const AUDIO_FILES = ['DUO1.mp3','DUO2.mp3','DUO3.mp3','DUO4.mp3','DUO5.mp3','DUO6.mp3'];
      const STORAGE_KEY = 'duo_player_state';

      let currentIndex   = 0;
      let isPlaying      = false;
      let isContinuous   = false;
      let showJa         = true;
      let playbackRate   = 1;
      let currentFileIdx = -1;
      let endTimeoutId   = null;

      const cardList      = document.getElementById('cardList');
      const audio         = document.getElementById('audioPlayer');
      const btnPlay       = document.getElementById('btnPlay');
      const btnPrev       = document.getElementById('btnPrev');
      const btnNext       = document.getElementById('btnNext');
      const playerNo      = document.getElementById('playerNo');
      const progressLabel = document.getElementById('progressLabel');
      const progressBar   = document.getElementById('progressBar');
      const speedBtns     = document.querySelectorAll('.speed-btn');
      const toggleCont    = document.getElementById('toggleContinuous');
      const toggleJaEl    = document.getElementById('toggleJa');
      const iconPlay      = btnPlay.querySelector('.icon-play');
      const iconPause     = btnPlay.querySelector('.icon-pause');

      // ── カード生成 ──────────────────────────────
      function buildCards() {
        const fragment = document.createDocumentFragment();
        SENTENCES.forEach((s, i) => {
          const card = document.createElement('div');
          card.className = 'card';
          card.dataset.index = i;
          card.innerHTML = `
            <div class="card-no">No.${String(i + 1).padStart(3, '0')}</div>
            <div class="card-en">${esc(s.en)}</div>
            <div class="card-ja">${esc(s.ja)}</div>
          `;
          card.addEventListener('click', () => onCardTap(i));
          fragment.appendChild(card);
        });
        cardList.appendChild(fragment);
      }

      function esc(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      function getCard(i) {
        return cardList.querySelector(`.card[data-index="${i}"]`);
      }

      // ── MP3 管理 ────────────────────────────────
      function fileIdxOf(i) {
        return Math.min(Math.floor(i / PER_FILE), AUDIO_FILES.length - 1);
      }

      function loadFileIfNeeded(i) {
        const fi = fileIdxOf(i);
        if (fi === currentFileIdx) return Promise.resolve();
        return new Promise(resolve => {
          audio.src = `${AUDIO_FILES[fi]}`;
          audio.load();
          currentFileIdx = fi;
          audio.addEventListener('canplay', resolve, { once: true });
        });
      }

      // ── 再生 ────────────────────────────────────
      async function playSentence(index, autoPlay = true) {
        if (index < 0 || index >= TOTAL) return;
        currentIndex = index;
        updateUI();

        await loadFileIfNeeded(index);
        audio.playbackRate = playbackRate;
        audio.currentTime  = SENTENCES[index].time;
        clearTimeout(endTimeoutId);

        if (autoPlay) {
          try {
            await audio.play();
            isPlaying = true;
            updatePlayIcon();
            scheduleEnd(index);
          } catch (e) {
            console.warn('再生エラー:', e);
          }
        }
      }

      function scheduleEnd(index) {
        const s = SENTENCES[index];
        // length秒再生 + 1秒の間
        const durMs = (s.length + 0.5) / playbackRate * 1000;

        endTimeoutId = setTimeout(() => {
          if (isContinuous && index + 1 < TOTAL) {
            playSentence(index + 1);
          } else {
            stopPlay();
          }
        }, durMs);
      }

      function stopPlay() {
        audio.pause();
        isPlaying = false;
        clearTimeout(endTimeoutId);
        updatePlayIcon();
        getCard(currentIndex)?.classList.remove('playing');
      }

      // ── UI 更新 ──────────────────────────────────
      function updateUI() {
        document.querySelectorAll('.card.active').forEach(c => c.classList.remove('active', 'playing'));
        const card = getCard(currentIndex);
        if (card) {
          card.classList.add('active');
          scrollToCard(card);
        }
        playerNo.textContent        = `No.${String(currentIndex + 1).padStart(3, '0')}`;
        progressLabel.textContent   = `${currentIndex + 1} / ${TOTAL}`;
        progressBar.style.width     = `${((currentIndex + 1) / TOTAL * 100).toFixed(2)}%`;
      }

      function updatePlayIcon() {
        const card = getCard(currentIndex);
        if (isPlaying) {
          iconPlay.classList.add('hidden');
          iconPause.classList.remove('hidden');
          card?.classList.add('playing');
        } else {
          iconPlay.classList.remove('hidden');
          iconPause.classList.add('hidden');
          card?.classList.remove('playing');
        }
      }

      function scrollToCard(card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      // ── カードタップ ─────────────────────────────
      function onCardTap(index) {
        if (index === currentIndex && isPlaying) {
          stopPlay();
        } else {
          playSentence(index);
        }
      }

      // ── ボタンイベント ───────────────────────────
      btnPlay.addEventListener('click', () => {
        isPlaying ? stopPlay() : playSentence(currentIndex);
      });

      btnNext.addEventListener('click', () => {
        if (currentIndex + 1 < TOTAL) playSentence(currentIndex + 1);
      });

      btnPrev.addEventListener('click', () => {
        const elapsed = audio.currentTime - SENTENCES[currentIndex].time;
        if (elapsed > 1.2 && isPlaying) {
          playSentence(currentIndex);
        } else if (currentIndex > 0) {
          playSentence(currentIndex - 1);
        }
      });

      // ── スピード ─────────────────────────────────
      speedBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          speedBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          playbackRate       = parseFloat(btn.dataset.speed);
          audio.playbackRate = playbackRate;
          if (isPlaying) {
            clearTimeout(endTimeoutId);
            scheduleEnd(currentIndex);
          }
          saveState();
        });
      });

      // ── トグル ───────────────────────────────────
      toggleCont.addEventListener('click', () => {
        isContinuous = !isContinuous;
        toggleCont.classList.toggle('active', isContinuous);
        saveState();
      });

      toggleJaEl.addEventListener('click', () => {
        showJa = !showJa;
        toggleJaEl.classList.toggle('active', showJa);
        document.querySelectorAll('.card-ja').forEach(el => {
          el.classList.toggle('hidden-ja', !showJa);
        });
        saveState();
      });

      // ── 音声終了 ─────────────────────────────────
      audio.addEventListener('ended', () => {
        clearTimeout(endTimeoutId);
        if (isContinuous && currentIndex + 1 < TOTAL) {
          playSentence(currentIndex + 1);
        } else {
          stopPlay();
        }
      });

      // ── スクロール連動 ───────────────────────────
      let scrollTimer = null;
      cardList.addEventListener('scroll', () => {
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
          if (isPlaying) return;
          const center = window.innerHeight / 2;
          let closest = 0, minDist = Infinity;
          document.querySelectorAll('.card').forEach(card => {
            const rect = card.getBoundingClientRect();
            const dist = Math.abs(rect.top + rect.height / 2 - center);
            if (dist < minDist) {
              minDist = dist;
              closest = parseInt(card.dataset.index, 10);
            }
          });
          if (closest !== currentIndex) {
            currentIndex = closest;
            updateUI();
            saveState();
          }
        }, 120);
      }, { passive: true });

      // ── ローカルストレージ ────────────────────────
      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          index: currentIndex,
          speed: playbackRate,
          continuous: isContinuous,
          showJa,
        }));
      }

      function loadState() {
        try {
          const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
          if (s.index      !== undefined) currentIndex = Math.min(s.index, TOTAL - 1);
          if (s.speed      !== undefined) playbackRate = s.speed;
          if (s.continuous !== undefined) isContinuous = s.continuous;
          if (s.showJa     !== undefined) showJa       = s.showJa;
        } catch (_) {}
      }

      function applyState() {
        speedBtns.forEach(b => b.classList.toggle('active', parseFloat(b.dataset.speed) === playbackRate));
        toggleCont.classList.toggle('active', isContinuous);
        toggleJaEl.classList.toggle('active', showJa);
        if (!showJa) {
          document.querySelectorAll('.card-ja').forEach(el => el.classList.add('hidden-ja'));
        }
      }

      // ── 初期化 ───────────────────────────────────
      function init() {
        loadState();
        buildCards();
        applyState();
        updateUI();
        updatePlayIcon();
        setTimeout(() => {
          getCard(currentIndex)?.scrollIntoView({ behavior: 'auto', block: 'center' });
        }, 100);
      }

      init();
    })();
  </script>
</body>
</html>
